#
name: Deploy to EC2 via ECR

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: ["docker-app/**"]

    # This block uses the below 'role-to-assume' which  OIDC and repository access.
permissions:
  id-token: write # allows GitHub to generate OIDC token for AWS login
  contents: read # allows workflow to access your repo code

env:
  ECR_REPOSITORY: my-app
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::565393030819:role/Github-Actions
          aws-region: ${{ secrets.AWS_REGION }}

      # 2. Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. Build image
      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG ./docker-app

      # 4. Tag image for ECR
      - name: Tag image
        run: |
          docker tag $ECR_REPOSITORY:$IMAGE_TAG \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      # 5. Push to ECR
      - name: Push image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      # 6. SSH into EC2 and pull new image
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}

            docker pull ${{ steps.login-ecr.outputs.registry }}/my-app:latest

            docker container stop my-app || true
            docker container rm my-app || true

            docker container run -d \
              --name my-app \
              -p 80:80 \
              ${{ steps.login-ecr.outputs.registry }}/my-app:latest
